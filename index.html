<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Learn Vue</title>
	<style type="text/css">
		body {
			background: #414141;
		}

		input,
		.box {
			width: 100px;
			margin: 10px;
			border: 0;
			padding: 0;
		}

		.box {
			height: 100px;
			background-color: aliceblue;
			display: inline-block;
			background-size: cover;
			background-position: center;
		}

		.message {
			min-height: 50px;
		}
		
		.message p {
			color: red;
			font-size: 14px;
		}

	</style>
</head>
<body>
	<div id="app">

		<input v-model="searchTerm">
		<button v-on:click="searchOrShowNext()">{{ getButtonMode }}</button>
		
		<br>

		<div class="box" v-bind:style="{ 'background-image': imgDisplayed }"></div>
		<div class="message">
			<p v-if="searchResults.length">Image {{ imgIndex + 1 }} of [todo]</p>
			<p v-if="lastSearched && !searchResults.length">No results, try again</p>
		</div>
		
	</div>

	<script src="./config.js"></script>
	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
	<script type="text/javascript">
		const appElement = document.getElementById("app");
		const app = Vue.createApp({
			data() {
				return {
					buttonMode: "Search",
					// apiToken: "Pwv9wcAfIDo4o3o1cu8frg4YRL5QvRliANPUWhn2J4U",
					maxResults: "30", // max one page, cba with pagination
					searchTerm: "",
					lastSearched: "",
					searchResults: [],
					imgIndex: 0,
				}
			},
			methods: {
				searchOrShowNext() {
					if (this.searchTerm !== this.lastSearched) {
						this.imgIndex = 0;
						this.searchUnsplash();
					} else {
						this.imgIndex++;
					}
				},
				async searchUnsplash() {
					const response = await fetch(`https://api.unsplash.com/search/photos/?query=${this.searchTerm}&per_page=${this.maxResults}&client_id=${wwwill.apiKey}`);
					const data = await response.json();
					this.searchResults = await data['results'];
					this.lastSearched = this.searchTerm;
					console.log(data);
				},
			},
			computed: {
				getButtonMode() {
					if (this.lastSearched !== this.searchTerm) {
						return "Search";
					}
					if (this.searchResults.length) {
						return "Next";
					}
					return "Search";
				},
				imgDisplayed() {
					return this.searchResults.length ? `url(${this.searchResults[`${this.imgIndex}`]["urls"]["small_s3"]})` : "";
				},
			},
		});

		app.mount(appElement);
	</script>
</body>
</html>
